app = "jellypod-prompt-queue"

# The port your Node.js server listens on
[env]
  PORT = "8080"

# Define how Fly should expose your application to the internet
[[services]]
  internal_port = 8080
  protocol = "tcp"

  # HTTP (port 80) and HTTPS (port 443) listeners
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health check configuration
  [[services.http_checks]]
    interval = "10s"
    timeout  = "5s"
    grace_period = "5s"
    method   = "get"
    path     = "/"
    protocol = "http"
