<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jellypod Prompt Queue</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
      color: #111;
      max-width: 1000px;
    }
    h1 { margin-top: 0; }
    fieldset {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    legend { font-weight: 600; }
    label { display: block; margin-top: 8px; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font: inherit;
    }
    textarea { min-height: 160px; resize: vertical; }
    button {
      margin-top: 12px;
      padding: 10px 14px;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .ok  { color: #0a0; }
    .err { color: #c00; }
    .queue { margin-top: 16px; }
    .item {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .item.done { border-color: #4caf50; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    pre { margin: 8px 0 0 0; white-space: pre-wrap; }
    .meta { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h1>Jellypod Prompt Queue</h1>

  <p class="meta">
    Submitters: enter the Submit Key, Title, and Prompt, then click <strong>Submit</strong>.<br>
    Admin: enter the Admin Key and click <strong>Load queue</strong>.
  </p>

  <fieldset>
    <legend>Submit prompt</legend>
    <form id="submitForm">
      <label>Submit key
        <input id="submitKey" autocomplete="off" required>
      </label>
      <label>Title
        <input id="title" autocomplete="off" required>
      </label>
      <label>Prompt
        <textarea id="prompt" required></textarea>
      </label>
      <button type="submit" id="submitBtn">Submit</button>
      <div id="submitMsg" class="msg"></div>
    </form>
  </fieldset>

  <fieldset>
    <legend>View queue / admin</legend>
    <label>Admin key
      <input id="adminKey" type="password" placeholder="Enter admin key" autocomplete="off">
    </label>
    <button id="loadBtn" type="button">Load queue</button>
    <div id="loadMsg" class="msg"></div>
    <div id="queue" class="queue"></div>
  </fieldset>

  <script>
    (() => {
      const API_BASE = 'https://jellypod-prompt-queue.fly.dev';

      function api(p) {
        return API_BASE.replace(/\/+$/, '') + (p.startsWith('/') ? p : '/' + p);
      }

      function msg(el, text, ok = true) {
        el.textContent = text;
        el.className = 'msg ' + (ok ? 'ok' : 'err');
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
      }

      async function callJson(url, init = {}) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 15000);
        try {
          const res = await fetch(url, { ...init, mode: 'cors', signal: controller.signal });
          const text = await res.text();
          const json = text ? JSON.parse(text) : {};
          if (!res.ok) throw new Error(json.error || json.message || `Server error (${res.status})`);
          return json;
        } catch (err) {
          if (err.name === 'AbortError') throw new Error('Request timed out');
          if (err instanceof TypeError) throw new Error('Could not reach server');
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      // ---- Submit ----
      document.getElementById('submitForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const key    = document.getElementById('submitKey').value.trim();
        const title  = document.getElementById('title').value.trim();
        const prompt = document.getElementById('prompt').value.trim();
        const btn    = document.getElementById('submitBtn');
        const msgEl  = document.getElementById('submitMsg');
        if (!key || !title || !prompt) return;
        btn.disabled = true;
        msg(msgEl, 'Submitting…');
        try {
          const data = await callJson(api('/api/submit'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, title, prompt }),
          });
          if (data.ok) {
            msg(msgEl, 'Submitted successfully.', true);
            document.getElementById('title').value = '';
            document.getElementById('prompt').value = '';
          } else {
            msg(msgEl, data.error || 'Submit failed', false);
          }
        } catch (err) {
          msg(msgEl, err.message, false);
        } finally {
          btn.disabled = false;
        }
      });

      // ---- Load queue ----
      document.getElementById('loadBtn').addEventListener('click', loadQueue);

      async function loadQueue() {
        const adminKey = document.getElementById('adminKey').value.trim();
        const msgEl    = document.getElementById('loadMsg');
        const q        = document.getElementById('queue');
        if (!adminKey) { msg(msgEl, 'Admin key required', false); return; }
        q.innerHTML = '';
        msg(msgEl, 'Loading…');
        try {
          const data = await callJson(api('/api/queue?key=') + encodeURIComponent(adminKey));
          if (!data.ok) throw new Error(data.error || 'Load failed');
          msg(msgEl, `Loaded ${data.queue?.length || 0} item(s)`, true);
          renderQueue(data.queue || []);
        } catch (err) {
          msg(msgEl, err.message, false);
        }
      }

      // ---- Render ----
      function renderQueue(items) {
        const q = document.getElementById('queue');
        q.innerHTML = '';
        if (items.length === 0) {
          q.innerHTML = '<p class="meta">Queue is empty.</p>';
          return;
        }
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item' + (item.done ? ' done' : '');
          const created = item.createdAt ? new Date(item.createdAt).toLocaleString() : '';
          div.innerHTML = `
            <div><strong>${escapeHtml(item.title || '')}</strong></div>
            <div class="meta">${item.done ? '✅ Done' : '🟡 Pending'}${created ? ' &bull; ' + escapeHtml(created) : ''}</div>
            <pre>${escapeHtml(item.prompt || '')}</pre>
            <div class="row">
              <button type="button" data-action="copyTitle"  data-id="${escapeHtml(item.id)}">Copy title</button>
              <button type="button" data-action="copyPrompt" data-id="${escapeHtml(item.id)}">Copy prompt</button>
              <button type="button" data-action="complete"   data-id="${escapeHtml(item.id)}">Complete</button>
              <button type="button" data-action="delete"     data-id="${escapeHtml(item.id)}">Delete</button>
            </div>`;
          q.appendChild(div);
        });

        q.onclick = async (event) => {
          const btn      = event.target.closest('button');
          if (!btn) return;
          const action   = btn.dataset.action;
          const id       = btn.dataset.id;
          const adminKey = document.getElementById('adminKey').value.trim();
          const msgEl    = document.getElementById('loadMsg');
          const item     = items.find(x => String(x.id) === String(id));

          try {
            if (action === 'copyTitle') {
              await navigator.clipboard.writeText(item?.title || '');
              msg(msgEl, 'Title copied', true);
              return;
            }
            if (action === 'copyPrompt') {
              await navigator.clipboard.writeText(item?.prompt || '');
              msg(msgEl, 'Prompt copied', true);
              return;
            }
            if (!adminKey) { msg(msgEl, 'Admin key required', false); return; }

            let url, method;
            if (action === 'complete') {
              url    = api(`/api/queue/${encodeURIComponent(id)}/complete?key=${encodeURIComponent(adminKey)}`);
              method = 'POST';
            } else if (action === 'delete') {
              url    = api(`/api/queue/${encodeURIComponent(id)}?key=${encodeURIComponent(adminKey)}`);
              method = 'DELETE';
            } else return;

            const data = await callJson(url, { method, headers: { 'Content-Type': 'application/json' } });
            if (!data.ok) throw new Error(data.error || 'Request failed');
            msg(msgEl, action === 'complete' ? 'Marked complete' : 'Deleted', true);
            loadQueue();
          } catch (err) {
            msg(msgEl, err.message, false);
          }
        };
      }
    })();
  </script>
</body>
</html>
